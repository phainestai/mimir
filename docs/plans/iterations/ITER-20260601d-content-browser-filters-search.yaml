id: ITER-20260601d
title: "Content Browser: filters, search, layout validation"
milestone: 5
description: >
  Final iteration for act-16 (Content Browser). Completes all remaining spec
  scenarios: entity type filter toolbar (FOB-11), phase filter (FOB-11b), node
  name search (FOB-12), layout position guard, and two spec-compliance fixes
  (FOB-27 tree highlight scoping, FOB-28 activity → parent workflow resources).
branch: iteration/20260531-content-browser-access
feature_spec: docs/features/act-16-content-browser/

gap_analysis:
  - fob: FOB-11
    status: partial
    note: "_applyFilters() exists and is URL-connected, but there is no rendered
      filter toolbar UI in the template. Nodes are dimmed via opacity but not
      properly hidden (Cytoscape visibility). Count badges missing."
  - fob: FOB-11b
    status: missing
    note: "Phase filter control not rendered. Phase dim logic not wired.
      Structural tree not filtered by phase."
  - fob: FOB-12
    status: missing
    note: "No search input in template; no _applySearch() function."
  - fob: FOB-27
    status: partial
    note: "_highlightTreeNode() called for all node types; spec says resource
      nodes (skill/agent/rule/artifact) must clear tree highlight, not set it."
  - fob: FOB-28
    status: partial
    note: "Activity node selection shows only that activity's resources.
      Spec says show parent workflow's full aggregated resources."
  - layout_position:
    status: missing
    note: "No positional E2E assertions. Multiline-comment bug proved these
      are needed — existing tests passed despite the panel being on the right."

