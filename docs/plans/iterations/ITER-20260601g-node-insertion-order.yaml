      - "Do NOT change node/edge data structure (_fullGraphData)"
      - "Do NOT use ES6 modules or import statements (vanilla script, no bundler)"
      - "Do NOT lazy-load CDN scripts on layout selection — load all at page start"
      - "Do NOT change ELK's orthogonal edge routing or node spacing defaults"
    implementation_note: >
      Build a self-contained vanilla-JS dropdown: on click of browser-layout-btn, toggle
      a position:absolute div (browser-layout-dropdown) that renders _LAYOUT_CATALOG grouped
      by group header. Each item sets _currentLayout = key, closes dropdown, calls _applyLayout(key).
      _applyLayout dispatches: elk-* → elk with algorithm suffix, dagre-* → dagre with rankDir,
      cy-* → native cytoscape layout name (strip 'cy-' prefix), single-name keys → name directly.
      Update existing TestLayoutSwitcher tests to use the new dropdown pattern.
      CDN URLs (jsDelivr):
        cola:          cytoscape-cola@2.5.1
        klay:          klayjs@0.4.1 + cytoscape-klay@3.1.4
        cise:          cytoscape-cise@2.2.2
        euler:         cytoscape-euler@1.2.2
        avsdf:         cytoscape-avsdf@1.2.1
        cose-bilkent:  cytoscape-cose-bilkent@4.1.0
        fcose:         cytoscape-fcose@2.2.0
