    URL management"
  doctrine_version: "2.0"
  created_at: "2026-05-31T20:00:00+02:00"
  feature_spec: "docs/features/act-16-content-browser/01-access-and-nav.feature"
  implementation_notes: "docs/features/act-16-content-browser/_implementation_notes.md"

conflict_map:
  methodology/browser_views.py: [S1, S2]
  tests/integration/test_content_browser_access.py: [S1, S2]
  templates/browser/browser_graph.html: [S1, S3]

parallel_groups:
  A: [S1]
  B: [S2, S3]   # both depend on A; S2 and S3 do not share files

drift_thresholds:
