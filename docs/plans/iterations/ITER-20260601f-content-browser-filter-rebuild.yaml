implementation_notes: |
  S30 is the core change:
  - Replace `_applyTypeFilter()` in content-browser.js with a rebuild approach:
    1. Determine active types from toggle state
    2. From raw graph data (_graphData), build element set = nodes whose type is active
       (plus Playbook root always)
    3. Remove all non-active nodes + their edges via cy.remove()
    4. Add back previously removed nodes when type re-activated via cy.add()
    5. Call _runElkLayout() after every add/remove
  - Alternatively: re-render from _graphData on every toggle (simpler but more disruptive)
  - Keep URL ?types= param logic unchanged
  - Phase filter (_applyPhaseFilter) untouched — dim model stays
