id: ITER-20260601f-content-browser-filter-rebuild
title: Content Browser — Entity-Type Filter Rebuild
feature: act-16-content-browser
branch: iteration/20260531-content-browser-access
pr: 27
created: 2026-06-01
status: planned

goal: |
  Change the entity-type filter from CSS hide/show to a full Cytoscape
  graph rebuild on each toggle. Filtered-out nodes and their edges are
  removed from cy entirely; the ELK layout auto-runs after every change.
  Phase filter and search keep their existing dim model — no change.

spec_changes_already_applied:
  - FOB-11 (06-filters-and-search.feature): "hidden" → "removed from cy + auto-re-layout"
  - FOB-29 (03-graph-rendering.feature): Re-plot reframed as manual re-trigger
  - FOB-32 (06-filters-and-search.feature): wording updated to "removed from canvas graph"

