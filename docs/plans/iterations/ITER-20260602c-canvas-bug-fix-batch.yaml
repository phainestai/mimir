        3. If NOT found (workflow row has no tree-wf-* ancestor), look for a
           SIBLING element with id starting 'tree-wf-' in the same parent div.
           If found → call _accordionWorkflow(siblingId). (handles workflow case)
      Replace the inline accordion logic in _highlightTreeNode with a call to
