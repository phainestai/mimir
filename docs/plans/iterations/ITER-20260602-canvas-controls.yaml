        lines: "542-616"
        note: "Replace _cytoscapeStyle() with _cytoscapeStyleEnhanced(); follow exact same return structure"
      - file: "docs/features/act-16-content-browser/07-canvas-controls.feature"
        lines: "127-230"
        note: "FOB-38 spec — exact shapes, colors, font-family, weights, sizes table"
      - file: "static/css/design-system.css"
        lines: "1-50"
