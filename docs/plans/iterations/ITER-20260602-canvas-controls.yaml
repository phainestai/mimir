iteration:
  goal: "Content Browser canvas controls — edge routing picker, sequence toggle, compound view, enhanced node styles"
  doctrine_version: "2.0"
  created_at: "2026-06-02T19:11:34+02:00"

conflict_map:
  # All 4 scenarios must modify content-browser.js at runtime — they are serialized.
  static/js/content-browser.js: [S38, S35, S36, S37]
  templates/browser/browser_graph.html: [S35, S36, S37]

parallel_groups:
  # All scenarios are serialized due to shared content-browser.js.
  # Ordering chosen for minimal coupling: style-only first, then additive controls,
  # then rebuild-affecting toggles, then most complex compound view last.
  A: [S38]   # pure style — no logic entanglement, establishes node shape vocabulary
  B: [S35]   # routing picker — additive, well-contained pattern (mirrors layout picker)
  C: [S36]   # seq toggle — modifies graph rebuild path; builds on URL param pattern from S35
  D: [S37]   # compound view — most complex; builds on rebuild infrastructure from S36

drift_thresholds:
  absorbed:
    checkpoint_fail_retry: 1       # retry once before escalating
  escalated:
    footprint_violation: true      # any file outside codebase_footprint[]
    method_explosion: true         # unplanned public method vs skeleton
    sao_violation: true            # SAO.md compliance check finds architectural breach
    checkpoint_fail_after_retry: true

scenarios:
