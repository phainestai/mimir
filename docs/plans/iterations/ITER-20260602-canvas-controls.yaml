      - tests/e2e/test_content_browser_node_styles.py
    checkpoint:
      command: "pytest tests/e2e/test_content_browser_node_styles.py -x"
      expected_exit_code: 0
    dependencies: []
    sao_sections:
      - "§Frontend Architecture: plain browser JS, no build step"
      - "§Design System: Bootstrap 5.3 + Montserrat, component-level styling only"
    context_map:
