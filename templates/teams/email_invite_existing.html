<!DOCTYPE html>
<html>
<body style="font-family: sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #0d6efd;">You've been invited to join the <em>{{ team.name }}</em> team on Mimir!</h2>
  <p>Hi {{ user.get_full_name|default:user.username }},</p>
  {% if welcome_text %}
  <blockquote style="border-left: 3px solid #0d6efd; padding-left: 12px; color: #555;">
    {{ welcome_text }}
  </blockquote>
  {% endif %}
  <p>Log in to view the team and accept the invitation:</p>
  <p>
    <a href="/teams/{{ team.pk }}/"
       style="background: #0d6efd; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none;">
      View Team
    </a>
  </p>
  <hr style="margin: 30px 0; border: none; border-top: 1px solid #eee;">
  <p style="font-size: 0.85em; color: #999;">The Mimir Team</p>
</body>
</html>
