<div class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);" data-testid="rule-delete-modal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Rule?</h5>
                <button type="button" class="btn-close" onclick="document.getElementById('rule-delete-modal-container').innerHTML=''"></button>
            </div>
            <div class="modal-body">
                <p>Delete <strong>{{ rule.title }}</strong>?</p>
                {% if activities %}
                <div class="alert alert-warning">{{ activities|length }} activit{{ activities|length|pluralize:"y,ies" }} linked — links will be removed.</div>
                {% endif %}
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('rule-delete-modal-container').innerHTML=''">Cancel</button>
                <form method="post" action="{{ delete_url }}" style="display:inline;">{% csrf_token %}
                    <button type="submit" class="btn btn-danger" data-testid="confirm-delete-rule-btn">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
