{% extends "base.html" %}
{% block title %}Create Rule - {{ playbook.name }}{% endblock %}

{% block content %}
<div class="container mt-4" data-testid="rule-create">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'playbook_list' %}">Playbooks</a></li>
            <li class="breadcrumb-item"><a href="{% url 'playbook_detail' pk=playbook.pk %}">{{ playbook.name }}</a></li>
            <li class="breadcrumb-item"><a href="{% url 'rule_list_playbook' playbook_pk=playbook.pk %}">Rules</a></li>
            <li class="breadcrumb-item active">Create</li>
        </ol>
    </nav>

    <h2>Create Rule</h2>
    <div class="card">
        <div class="card-body">
            <form method="post" action="{% url 'rule_create' playbook_pk=playbook.pk %}" data-testid="rule-form">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="title">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control {% if errors.title %}is-invalid{% endif %}" id="title" name="title"
                           maxlength="200" value="{{ form_data.title|default:'' }}" required data-testid="rule-title-input">
                    {% if errors.title %}<div class="invalid-feedback">{{ errors.title }}</div>{% endif %}
                </div>
                <div class="mb-3">
                    <label class="form-label" for="slug">Slug</label>
                    <input type="text" class="form-control" id="slug" name="slug" maxlength="220"
                           value="{{ form_data.slug|default:'' }}" data-testid="rule-slug-input"
                           placeholder="Auto from title if empty">
                </div>
                <div class="mb-3 form-check">
                    <input class="form-check-input" type="checkbox" name="always_apply" id="always_apply"
                           {% if form_data.always_apply %}checked{% endif %}>
                    <label class="form-check-label" for="always_apply">Always apply (exported .mdc front matter)</label>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="content">Content</label>
                    <textarea class="form-control font-monospace" id="content" name="content" rows="14"
                              data-testid="rule-content-input">{{ form_data.content|default:'' }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary" data-testid="rule-submit-btn">Create Rule</button>
                <a href="{% url 'rule_list_playbook' playbook_pk=playbook.pk %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
