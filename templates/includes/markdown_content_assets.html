<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
    (function () {
        var themeAttr = document.documentElement.getAttribute('data-bs-theme');
        var mermaidTheme = themeAttr === 'dark' ? 'dark' : 'default';
        mermaid.initialize({
            startOnLoad: true,
            theme: mermaidTheme,
            securityLevel: 'loose'
        });
        console.log('markdown: mermaid initialized', { theme: mermaidTheme });
    })();
</script>
<style>
    /* Structural helpers only — colors come from design-system.css */
    .mermaid {
        text-align: center;
        margin: 1rem 0;
    }
    .pip-preview-markdown {
        max-height: 28rem;
        overflow-y: auto;
    }
</style>
