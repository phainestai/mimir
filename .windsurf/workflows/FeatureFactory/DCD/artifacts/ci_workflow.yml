# ==============================================================================
# Artifact: CI Pipeline — GitHub Actions
# Workflow: DCD — Design & Deploy CICD
#
# Thin wrapper around `make` targets. No business logic in YAML.
# Copy to {project}/.github/workflows/ci.yml
# ==============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # --------------------------------------------------------------------------
  # Test — runs on every push and PR
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: make provision

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

      - name: Integration tests
        run: make test-integration

  # --------------------------------------------------------------------------
  # Build — only on main after tests pass (not on PRs)
  # --------------------------------------------------------------------------
  build:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build and push containers
        run: make containers

      - name: Output image tag
        run: echo "Image tag: $(git rev-parse --short HEAD)"
